name = "profesormvt-web"
main = "worker/index.js"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

send_email = [
  { name = "AVISOS" }
]

[vars]
VAPID_PUBLIC_KEY = "BOvh-j1DbMRYE_vHhKcp1kxNbT4hnlndhsX1evIqwsCMYyvE5sfijYoy9a9ztiSu24XVGJsabtTiLhgN1LM4or4"
# WhatsApp Cloud API (11-jul-2026): phone_number_id de la WABA "ProfesorMVT" (app Meta id
# 887510117208924, portfolio Tramboyos Musica). Numero de PRUEBA por ahora (Fase A); se
# reemplaza por el numero real en Fase B cuando llegue el chip. Secrets: WHATSAPP_TOKEN /
# WHATSAPP_VERIFY_TOKEN (no van aqui, ver .wa-verify-token.local).
WA_PHONE_ID = "1175919422274911"

[assets]
directory = "./dist"
not_found_handling = "404-page"
binding = "ASSETS"
run_worker_first = ["/api/*", "/r/*"]

[[d1_databases]]
binding = "DB"
database_name = "profesormvt-crm"
database_id = "e0c9c96a-5f17-4ae1-b2c8-b5e692fe0849"

[[r2_buckets]]
binding = "RECURSOS_R2"
bucket_name = "profesormvt-recursos"

# Workers AI (Llama) para el chatbot. Gratis para el volumen de MVT, sin API key ni saldo.
[ai]
binding = "AI"

[triggers]
# Cada hora: alimenta los recordatorios de clase (T-24h y T-2h).
# Las renovaciones siguen corriendo 1 vez/día (el Worker filtra por la hora 14 UTC).
crons = ["0 * * * *"]

# Logs persistentes del Worker (21-jul-2026): sin esto, un bug como el del doble conteo
# es invisible hasta que un alumno se queja.
[observability]
enabled = true
