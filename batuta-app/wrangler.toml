name = "batuta-app"
main = "worker/index.js"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
html_handling = "none"
not_found_handling = "none"
run_worker_first = ["/app", "/app/*"]

[[d1_databases]]
binding = "DB"
database_name = "batuta-app"
database_id = "a9b7c988-1c1e-42d4-8b6c-dc5bc7305987"

[[r2_buckets]]
binding = "RECURSOS_R2"
bucket_name = "batuta-app-archivos"

# Nurture de trial (dia 1/3/6 + cierre del vencido): 1 corrida diaria, 14:00 UTC = 9am Lima.
[triggers]
crons = ["0 14 * * *"]
