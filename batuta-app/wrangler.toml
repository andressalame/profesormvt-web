name = "batuta-app"
main = "worker/index.js"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
html_handling = "none"
not_found_handling = "none"
run_worker_first = ["/app", "/app/*"]

[[d1_databases]]
binding = "DB"
database_name = "batuta-app"
database_id = "a9b7c988-1c1e-42d4-8b6c-dc5bc7305987"

[[r2_buckets]]
binding = "RECURSOS_R2"
bucket_name = "batuta-app-archivos"

# Workers AI (Llama): asistente de onboarding gratis (fallback si no hay ANTHROPIC_API_KEY).
[ai]
binding = "AI"

# Observabilidad: logs persistidos para que un bug de saldo/cobro no vuelva a ser invisible
# hasta que un cliente se queje (leccion MVT 21-jul).
[observability]
enabled = true

# UN solo cron (limite de 5 por cuenta en el plan free): corre cada 15 min.
# - Cada corrida: recordatorios de clase a alumnos (24h y 1h antes de su reserva).
# - La corrida de las 14:00 UTC (9am Lima): ademas nurture de trial + renovaciones + reset demo.
[triggers]
crons = ["*/15 * * * *"]
