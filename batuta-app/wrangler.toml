name = "batuta-app"
main = "worker/index.js"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
not_found_handling = "404-page"
binding = "ASSETS"
run_worker_first = ["/app", "/app/*"]

[[d1_databases]]
binding = "DB"
database_name = "batuta-app"
database_id = "PENDIENTE"
